name: Daily Stock Analysis

on:
  schedule:
    # 매일 오전 8시 (한국시간 = UTC+9, GitHub Actions는 UTC 기준)
    - cron: '0 23 * * 0-4'  # 일~목 23:00 UTC = 한국 월~금 08:00
  workflow_dispatch:  # 수동 실행 가능

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install FinanceDataReader pandas requests

      - name: Run stock analysis
        env:
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
        run: python scripts/fetch_daily_data.py

      - name: Commit and push data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Daily stock data update $(date '+%Y-%m-%d')"
          git push
          
