<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 주식 레이더 — 오늘의 TOP 10</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 로딩 -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="lmsg">AI 분석 데이터 로딩 중...</div>
</div>

<!-- 헤더 -->
<header>
  <div class="header-inner">
    <div class="logo"><div class="logo-dot"></div>AI 주식 레이더</div>
    <div class="hright">
      <span class="live-badge" id="liveBadge">● LIVE</span>
      <span class="hdate" id="hdate"></span>
    </div>
  </div>
</header>

<main>
  <!-- 성과 배너 -->
  <div class="perf-banner">
    <div class="perf-item"><div class="perf-label">누적 적중률</div><div class="perf-val" id="hitRate">--%</div></div>
    <div class="perf-divider"></div>
    <div class="perf-item"><div class="perf-label">검증 완료</div><div class="perf-val" id="totalPicks">--건</div></div>
    <div class="perf-divider"></div>
    <div class="perf-item"><div class="perf-label">평균 수익률</div><div class="perf-val" id="avgReturn">--%</div></div>
    <div class="perf-divider"></div>
    <div class="perf-item"><div class="perf-label">분석 종목</div><div class="perf-val" id="totalAnalyzed">--</div></div>
  </div>

  <!-- 지수바 -->
  <div class="idx-bar" id="idxBar"></div>

  <!-- AI 요약 -->
  <div class="ai-summary">
    <div class="ai-icon">🤖</div>
    <div style="flex:1">
      <div class="ai-label">AI 시장 분석</div>
      <div class="ai-text" id="aiText">분석 중...</div>
      <div class="ai-sub" id="aiSub"></div>
    </div>
  </div>

  <!-- TOP 10 -->
  <div class="sh">
    <div class="st">오늘의 AI 추천 <span class="badge">TOP 10</span></div>
    <button class="refresh-btn" onclick="location.reload()">↺ 새로고침</button>
  </div>
  <div class="grid" id="grid"></div>

  <!-- 차트 -->
  <div class="charts">
    <div class="ccrd"><div class="ctit">📊 팩터별 평균 스코어</div><div class="cwrap"><canvas id="radar"></canvas></div></div>
    <div class="ccrd"><div class="ctit">📈 TOP 10 종합 점수</div><div class="cwrap"><canvas id="barC"></canvas></div></div>
  </div>

  <!-- 성과 추적 -->
  <div class="perf-section">
    <div class="sh" style="margin-bottom:.75rem">
      <div class="st">📋 추천 성과 추적 <span class="badge">적중률 검증</span></div>
    </div>
    <div class="ptabs">
      <div class="ptab active" onclick="switchTab('recent')">최근 추천</div>
      <div class="ptab" onclick="switchTab('stats')">통계</div>
    </div>
    <div id="tabRecent"></div>
    <div id="tabStats" style="display:none"></div>
  </div>
</main>

<!-- 모달 -->
<div class="moverlay" id="moverlay" onclick="closeM(event)">
  <div class="modal">
    <div class="mhdr">
      <div>
        <div style="font-size:1.12rem;font-weight:700;" id="mName"></div>
        <div style="font-size:.73rem;color:var(--text3);margin-top:3px;" id="mMeta"></div>
      </div>
      <button class="mclose" onclick="closeM()">✕</button>
    </div>
    <div class="mstats" id="mStats"></div>
    <div class="mchw"><canvas id="mChart"></canvas></div>
    <div class="mrbox"><div class="mrtit">✅ AI 선정 이유</div><div id="mReasons"></div></div>
    <div class="mrkbox"><span style="font-size:.8rem">⚠️</span><span class="mrktxt" id="mRisk"></span></div>
    <div style="font-size:.78rem;font-weight:500;margin-bottom:7px;color:var(--text2);">팩터 상세 분석</div>
    <div id="mFactors"></div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  alert("HTML OK");
</script>
<script src="/js/app.js?v=999"></script>
</body>
  </html>
