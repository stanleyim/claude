<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 주식 예측 — 오늘의 TOP 10</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap');

  :root {
    --bg: #0a0e1a;
    --bg2: #111827;
    --bg3: #1a2235;
    --card: #141e30;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f4ff;
    --text2: #8899bb;
    --text3: #5a6a88;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --green: #22c55e;
    --red: #ef4444;
    --gold: #f59e0b;
    --purple: #a78bfa;
    --teal: #2dd4bf;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── 배경 그리드 ─────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── 헤더 ────────────────────────────────── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,14,26,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
  }
  .header-inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px;
  }
  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.1rem; font-weight: 700;
    color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.6; transform:scale(1.3); }
  }
  .header-date {
    font-size: 0.8rem; color: var(--text3);
  }

  /* ─── 메인 레이아웃 ───────────────────────── */
  main {
    max-width: 1200px; margin: 0 auto;
    padding: 1.5rem;
    position: relative; z-index: 1;
  }

  /* ─── 지수 바 ─────────────────────────────── */
  .index-bar {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
    gap: 12px; margin-bottom: 1.5rem;
  }
  .index-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
  }
  .index-name { font-size: 0.75rem; color: var(--text3); margin-bottom: 4px; }
  .index-val  { font-family: 'Space Grotesk',sans-serif; font-size: 1.3rem; font-weight: 700; }
  .index-chg  { font-size: 0.8rem; margin-top: 2px; }
  .up   { color: var(--green); }
  .down { color: var(--red); }

  /* ─── AI 시장 요약 ────────────────────────── */
  .ai-summary {
    background: linear-gradient(135deg, rgba(59,130,246,0.08), rgba(167,139,250,0.05));
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
    display: flex; gap: 1rem; align-items: flex-start;
  }
  .ai-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: rgba(59,130,246,0.15);
    border: 1px solid rgba(59,130,246,0.3);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 1rem;
  }
  .ai-label { font-size: 0.7rem; color: var(--accent2); font-weight: 500; margin-bottom: 4px; letter-spacing: 0.05em; }
  .ai-text  { font-size: 0.88rem; color: var(--text2); line-height: 1.6; }

  /* ─── 섹션 헤더 ───────────────────────────── */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1rem;
  }
  .section-title {
    font-size: 1rem; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
  }
  .badge {
    font-size: 0.7rem; font-weight: 500; padding: 2px 8px;
    border-radius: 20px; background: rgba(59,130,246,0.15);
    color: var(--accent2); border: 1px solid rgba(59,130,246,0.2);
  }
  .refresh-btn {
    font-size: 0.78rem; color: var(--text3);
    background: none; border: 1px solid var(--border2);
    border-radius: 8px; padding: 5px 12px; cursor: pointer;
    transition: all 0.2s;
  }
  .refresh-btn:hover { color: var(--text); border-color: var(--border2); background: var(--bg3); }

  /* ─── TOP 10 그리드 ───────────────────────── */
  .stocks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 12px;
    margin-bottom: 2rem;
  }

  /* ─── 종목 카드 ───────────────────────────── */
  .stock-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.1rem 1.25rem;
    cursor: pointer;
    transition: all 0.25s;
    position: relative; overflow: hidden;
  }
  .stock-card::before {
    content: '';
    position: absolute; top:0; left:0; right:0; height:2px;
    background: linear-gradient(90deg, var(--accent), var(--purple));
    opacity: 0; transition: opacity 0.25s;
  }
  .stock-card:hover { border-color: var(--border2); transform: translateY(-2px); }
  .stock-card:hover::before { opacity: 1; }
  .stock-card.rank-1 { border-color: rgba(245,158,11,0.3); }
  .stock-card.rank-1::before { opacity: 1; background: linear-gradient(90deg, var(--gold), #fbbf24); }
  .stock-card.rank-2 { border-color: rgba(148,163,184,0.25); }
  .stock-card.rank-3 { border-color: rgba(180,120,60,0.25); }

  .card-top {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 10px;
  }
  .rank-badge {
    font-family: 'Space Grotesk',sans-serif;
    font-size: 0.7rem; font-weight: 700;
    width: 24px; height: 24px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg3); color: var(--text3);
  }
  .rank-1 .rank-badge { background: rgba(245,158,11,0.15); color: var(--gold); }
  .rank-2 .rank-badge { background: rgba(148,163,184,0.12); color: #94a3b8; }
  .rank-3 .rank-badge { background: rgba(180,120,60,0.12); color: #b47a3c; }

  .stock-name-block { flex:1; padding: 0 10px; }
  .stock-name { font-size: 0.95rem; font-weight: 700; }
  .stock-meta { font-size: 0.72rem; color: var(--text3); margin-top: 2px; }
  .sector-pill {
    font-size: 0.65rem; padding: 2px 7px; border-radius: 20px;
    background: var(--bg3); color: var(--text3);
    border: 1px solid var(--border);
  }

  .score-circle {
    width: 48px; height: 48px; border-radius: 50%;
    border: 2px solid var(--accent);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .score-num  { font-family:'Space Grotesk',sans-serif; font-size:1rem; font-weight:700; color:var(--accent2); line-height:1; }
  .score-label{ font-size:0.55rem; color:var(--text3); margin-top:1px; }

  .price-row {
    display: flex; align-items: baseline; gap: 8px;
    margin-bottom: 10px;
  }
  .price { font-family:'Space Grotesk',sans-serif; font-size:1.15rem; font-weight:700; }
  .change-rate { font-size:0.82rem; font-weight:500; }

  /* ─── 팩터 바 ─────────────────────────────── */
  .factors { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
  .factor-row { display: flex; align-items: center; gap: 8px; }
  .factor-name { font-size: 0.68rem; color: var(--text3); width: 44px; flex-shrink:0; }
  .factor-bar-bg {
    flex: 1; height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden;
  }
  .factor-bar {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--purple));
    transition: width 0.8s ease;
  }
  .factor-val { font-size: 0.65rem; color: var(--text2); width: 26px; text-align: right; flex-shrink:0; }

  /* ─── AI 코멘트 ───────────────────────────── */
  .ai-comment {
    font-size: 0.78rem; color: var(--text2); line-height: 1.55;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .ai-comment-loading { color: var(--text3); font-style: italic; }

  /* ─── 수급 지표 ───────────────────────────── */
  .supply-row {
    display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap;
  }
  .supply-chip {
    font-size: 0.65rem; padding: 3px 8px; border-radius: 6px;
    border: 1px solid; font-weight: 500;
  }
  .chip-foreign   { background: rgba(59,130,246,0.08); color:#60a5fa; border-color:rgba(59,130,246,0.2); }
  .chip-institution{ background: rgba(167,139,250,0.08); color:#a78bfa; border-color:rgba(167,139,250,0.2); }
  .chip-volume    { background: rgba(45,212,191,0.08); color:#2dd4bf; border-color:rgba(45,212,191,0.2); }

  /* ─── 차트 섹션 ───────────────────────────── */
  .chart-section {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.25rem;
    margin-bottom: 1.5rem;
  }
  .chart-title { font-size: 0.88rem; font-weight: 500; margin-bottom: 1rem; color: var(--text2); }
  .chart-wrap  { position: relative; height: 220px; }

  /* ─── 상세 모달 ───────────────────────────── */
  .modal-overlay {
    position: fixed; inset:0; background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px); z-index: 200;
    display: none; align-items: center; justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: 18px; width: 100%; max-width: 520px;
    max-height: 85vh; overflow-y: auto;
    padding: 1.5rem;
  }
  .modal-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 1.25rem;
  }
  .modal-close {
    background: none; border: none; color: var(--text3);
    font-size: 1.2rem; cursor: pointer; padding: 4px;
  }
  .modal-price-row {
    display: flex; gap: 16px; margin-bottom: 1.25rem;
  }
  .modal-stat { flex:1; background: var(--bg3); border-radius: 10px; padding: 10px; }
  .modal-stat-label { font-size: 0.68rem; color: var(--text3); margin-bottom: 4px; }
  .modal-stat-val { font-family:'Space Grotesk',sans-serif; font-size:1rem; font-weight:600; }
  .modal-chart-wrap { position:relative; height:180px; margin-bottom:1rem; }
  .modal-factors { margin-bottom: 1rem; }
  .modal-factor-row {
    display: flex; align-items:center; gap:10px;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .modal-factor-name { font-size:0.78rem; color:var(--text2); width:60px; flex-shrink:0; }
  .modal-factor-bar-bg { flex:1; height:8px; background:var(--bg3); border-radius:4px; overflow:hidden; }
  .modal-factor-bar { height:100%; border-radius:4px; background:linear-gradient(90deg,var(--accent),var(--purple)); }
  .modal-factor-pct { font-size:0.78rem; color:var(--text); width:32px; text-align:right; flex-shrink:0; font-weight:500; }
  .modal-weight { font-size:0.68rem; color:var(--text3); width:30px; flex-shrink:0; }

  /* ─── 로딩 ────────────────────────────────── */
  .loading-overlay {
    position: fixed; inset:0; background: var(--bg);
    display: flex; flex-direction:column;
    align-items:center; justify-content:center; z-index:500;
    gap: 16px;
  }
  .loading-spinner {
    width: 40px; height: 40px; border-radius: 50%;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size:0.85rem; color:var(--text3); }

  /* ─── 반응형 ──────────────────────────────── */
  @media (max-width: 600px) {
    .stocks-grid { grid-template-columns: 1fr; }
    .modal-price-row { flex-direction: column; }
    header { padding: 0 1rem; }
    main { padding: 1rem; }
  }
</style>
</head>
<body>

<!-- 로딩 -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">AI 분석 중... 종목 스코어링 완료까지 잠시만 기다려주세요</div>
</div>

<!-- 헤더 -->
<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-dot"></div>
      AI 주식 레이더
    </div>
    <div class="header-date" id="headerDate"></div>
  </div>
</header>

<!-- 메인 -->
<main>
  <!-- 지수 바 -->
  <div class="index-bar" id="indexBar"></div>

  <!-- AI 시장 요약 -->
  <div class="ai-summary">
    <div class="ai-icon">🤖</div>
    <div>
      <div class="ai-label">AI 시장 요약</div>
      <div class="ai-text" id="aiSummary">분석 중...</div>
    </div>
  </div>

  <!-- TOP 10 -->
  <div class="section-header">
    <div class="section-title">
      오늘의 AI 추천 종목
      <span class="badge">TOP 10</span>
    </div>
    <button class="refresh-btn" onclick="refreshAnalysis()">↺ 재분석</button>
  </div>
  <div class="stocks-grid" id="stocksGrid"></div>

  <!-- 스코어 분포 차트 -->
  <div class="chart-section">
    <div class="chart-title">📊 팩터별 평균 스코어 분포 (TOP 10)</div>
    <div class="chart-wrap">
      <canvas id="factorChart" role="img" aria-label="5개 팩터별 평균 점수 레이더 차트"></canvas>
    </div>
  </div>
</main>

<!-- 상세 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="stock-name" id="modalName" style="font-size:1.2rem;font-weight:700;"></div>
        <div class="stock-meta" id="modalMeta" style="font-size:0.78rem;color:var(--text3);margin-top:4px;"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-price-row" id="modalPriceRow"></div>
    <div class="modal-chart-wrap">
      <canvas id="modalChart" role="img" aria-label="종목 60일 주가 차트"></canvas>
    </div>
    <div style="font-size:0.82rem;font-weight:500;margin-bottom:8px;color:var(--text2);">팩터별 분석</div>
    <div class="modal-factors" id="modalFactors"></div>
    <div style="font-size:0.82rem;font-weight:500;margin:12px 0 6px;color:var(--text2);">AI 투자 코멘트</div>
    <div class="ai-comment" id="modalComment"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// 1. 스코어링 엔진
// ══════════════════════════════════════════════
const avg = arr => arr.reduce((a,b)=>a+b,0)/arr.length;
const std = arr => { const m=avg(arr); return Math.sqrt(arr.reduce((a,b)=>a+(b-m)**2,0)/arr.length); };

function calcRSI(closes, p=14) {
  if(closes.length<p+1) return 50;
  let g=0,l=0;
  for(let i=closes.length-p;i<closes.length;i++){
    const d=closes[i]-closes[i-1];
    if(d>0)g+=d; else l+=Math.abs(d);
  }
  const ag=g/p,al=l/p;
  if(al===0) return 100;
  return 100-100/(1+ag/al);
}

function calcEMA(closes,p) {
  const k=2/(p+1); let e=closes[0];
  for(let i=1;i<closes.length;i++) e=closes[i]*k+e*(1-k);
  return e;
}

function calcBB(closes,p=20) {
  if(closes.length<p) return {pct:50};
  const sl=closes.slice(-p),m=avg(sl),sd=std(sl);
  const upper=m+2*sd,lower=m-2*sd;
  const latest=closes[closes.length-1];
  return {pct:((latest-lower)/(upper-lower))*100,upper,lower,middle:m};
}

function calcATR(highs,lows,closes,p=14) {
  if(closes.length<p+1) return 0;
  const trs=[];
  for(let i=closes.length-p;i<closes.length;i++)
    trs.push(Math.max(highs[i]-lows[i],Math.abs(highs[i]-closes[i-1]),Math.abs(lows[i]-closes[i-1])));
  return avg(trs);
}

function checkMA(closes) {
  if(closes.length<60) return 0;
  const l=closes[closes.length-1];
  const ma5=avg(closes.slice(-5)),ma20=avg(closes.slice(-20)),ma60=avg(closes.slice(-60));
  if(l>ma5&&ma5>ma20&&ma20>ma60) return 100;
  if(l>ma20&&ma20>ma60) return 60;
  if(l>ma60) return 30;
  return 0;
}

function scoreSupply(s) {
  let sc=0;
  if(s.foreignBuyDays>=3) sc+=Math.min(40,s.foreignBuyDays*10);
  if(s.institutionBuyDays>=2) sc+=Math.min(30,s.institutionBuyDays*10);
  if(s.foreignNetBuy>0&&s.institutionNetBuy>0) sc+=30;
  return Math.min(100,sc);
}

function scoreMomentum(s) {
  let sc=0;
  if(!s.closes||s.closes.length<20) return 50;
  sc+=checkMA(s.closes)*0.4;
  const rsi=calcRSI(s.closes);
  if(rsi>=50&&rsi<=70) sc+=40;
  else if(rsi>=40&&rsi<50) sc+=20;
  else if(rsi>70&&rsi<=80) sc+=15;
  else if(rsi>30&&rsi<40) sc+=10;
  const ema12=calcEMA(s.closes,12),ema26=calcEMA(s.closes,26);
  if(ema12>ema26) sc+=20;
  return Math.min(100,sc);
}

function scoreFundamental(s) {
  let sc=0;
  if(s.per>0&&s.per<10) sc+=30; else if(s.per<15) sc+=25; else if(s.per<20) sc+=15; else if(s.per<30) sc+=5;
  if(s.pbr>0&&s.pbr<1) sc+=25; else if(s.pbr<1.5) sc+=15; else if(s.pbr<2) sc+=8;
  if(s.roe>20) sc+=25; else if(s.roe>=15) sc+=20; else if(s.roe>=10) sc+=12; else if(s.roe>=5) sc+=5;
  if(s.debtRatio<50) sc+=20; else if(s.debtRatio<100) sc+=12; else if(s.debtRatio<150) sc+=5;
  return Math.min(100,sc);
}

function scoreVolatility(s) {
  let sc=50;
  if(!s.closes||s.closes.length<20) return sc;
  const bb=calcBB(s.closes);
  if(bb.pct<20) sc+=40; else if(bb.pct<35) sc+=25; else if(bb.pct>80) sc-=20;
  const atr=calcATR(s.highs,s.lows,s.closes);
  const atrR=(atr/s.closes[s.closes.length-1])*100;
  if(atrR<2) sc+=10; else if(atrR>5) sc-=20;
  return Math.min(100,Math.max(0,sc));
}

function scoreVolume(s) {
  if(!s.volumes||s.volumes.length<20) return 50;
  const r=s.volumes[s.volumes.length-1]/avg(s.volumes.slice(-20));
  if(r>=3) return 100; if(r>=2) return 80; if(r>=1.5) return 60; if(r>=1) return 40; return 20;
}

function calcComposite(stock) {
  const s=scoreSupply(stock),m=scoreMomentum(stock),f=scoreFundamental(stock),
        v=scoreVolatility(stock),vol=scoreVolume(stock);
  const total=Math.round(s*0.30+m*0.25+f*0.20+v*0.15+vol*0.10);
  return {total,breakdown:{supply:Math.round(s),momentum:Math.round(m),
    fundamental:Math.round(f),volatility:Math.round(v),volume:Math.round(vol)}};
}

// ══════════════════════════════════════════════
// 2. 데이터 생성
// ══════════════════════════════════════════════
const STOCKS_META = [
  {code:"005930",name:"삼성전자",market:"KOSPI",sector:"반도체"},
  {code:"000660",name:"SK하이닉스",market:"KOSPI",sector:"반도체"},
  {code:"035420",name:"NAVER",market:"KOSPI",sector:"인터넷"},
