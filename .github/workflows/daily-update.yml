name: Daily Stock Analysis

on:
  schedule:
    # 매일 오전 5:30 KST 실행 (UTC+9 기준: 일~목 20:30 UTC = 월~금 05:30 KST)
    - cron: '30 20 * * 0-4'  # ✅ month 필드(*) 추가
  workflow_dispatch:  # 수동 실행

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # ✅ git push 권한 명시
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip  # ✅ 권장 방식

      - name: Install dependencies
        run: pip install finance-datareader pandas requests

      - name: Run stock analysis
        env:
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
        run: python scripts/fetch_daily_data.py

      - name: Commit and push data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          # 변경사항이 있을 때만 커밋
          git diff --staged --quiet || git commit -m "📊 Daily stock data update $(date '+%Y-%m-%d %H:%M')"
          git push
