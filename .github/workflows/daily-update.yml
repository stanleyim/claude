name: Daily Stock Analysis

on:
  schedule:
    # 한국시간 매일 오전 8시 30분 = UTC 23:30 (전날)
    - cron: '30 23 * * 0-4'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Python 3.10 고정
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ✅ pip upgrade + no-cache-dir + requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      # ✅ 네트워크 / SSL 사전 확인
      - name: Network check
        run: |
          python -c "import ssl; print('SSL:', ssl.OPENSSL_VERSION)"
          python -c "import urllib.request; urllib.request.urlopen('https://finance.naver.com', timeout=10); print('Naver OK')"
          python -c "import urllib.request; urllib.request.urlopen('https://finance.yahoo.com', timeout=10); print('Yahoo OK')"

      # ✅ 메인 분석 실행
      - name: Run analysis
        run: python scripts/fetch_daily_data.py

      # ✅ 결과 커밋
      - name: Commit data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --staged --quiet || git commit -m "📊 $(date '+%Y-%m-%d') 일일 분석 업데이트"
          git push
