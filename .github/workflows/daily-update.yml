name: Daily Stock Pipeline

on:
  schedule:
    # 매일 오전 6시 (UTC 기준 → KST 15:00 이전 조정 필요하면 말해줘)
    - cron: "0 21 * * 0-4"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ─────────────────────────────
    # 1. 코드 체크아웃
    # ─────────────────────────────
    - name: Checkout repo
      uses: actions/checkout@v4

    # ─────────────────────────────
    # 2. Python 설정
    # ─────────────────────────────
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # ─────────────────────────────
    # 3. pip 캐시 (속도 핵심)
    # ─────────────────────────────
    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # ─────────────────────────────
    # 4. 의존성 설치 (최적화)
    # ─────────────────────────────
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt --no-cache-dir

    # ─────────────────────────────
    # 5. 데이터 생성
    # ─────────────────────────────
    - name: Fetch daily stocks
      run: python scripts/fetch_daily_data.py

    # ─────────────────────────────
    # 6. 성과 추적
    # ─────────────────────────────
    - name: Track performance
      run: python scripts/track_prices.py

    # ─────────────────────────────
    # 7. 통계 계산
    # ─────────────────────────────
    - name: Calculate stats
      run: python scripts/calc_stats.py

    # ─────────────────────────────
    # 8. 결과 커밋
    # ─────────────────────────────
    - name: Commit results
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add data/
        git commit -m "auto update data" || echo "No changes"
        git push
