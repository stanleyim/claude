name: Daily Stock Pipeline

on:
  schedule:
    # UTC 기준 (KST = UTC+9, 장 마감 후 오후 6시 = UTC 09:00)
    - cron: "0 21 * * 0-4"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ─────────────────────────────
    # 1. 코드 체크아웃
    # ─────────────────────────────
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    # ─────────────────────────────
    # 2. Python 설정
    # ─────────────────────────────
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # ─────────────────────────────
    # 3. pip 캐시
    # ─────────────────────────────
    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # ─────────────────────────────
    # 4. 의존성 설치
    # ─────────────────────────────
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt --no-cache-dir

    # ─────────────────────────────
    # 5. 데이터 생성
    # ─────────────────────────────
    - name: Fetch daily stocks
      run: |
        set -e
        python scripts/fetch_daily_data.py

    # ─────────────────────────────
    # 6. 성과 추적
    # ─────────────────────────────
    - name: Track performance
      run: |
        set -e
        python scripts/track_prices.py

    # ─────────────────────────────
    # 7. 통계 계산
    # ─────────────────────────────
    - name: Calculate stats
      run: |
        set -e
        python scripts/calc_stats.py

    # ─────────────────────────────
    # 8. REPORT 생성 (추가된 핵심)
    # ─────────────────────────────
    - name: Build report.json
      run: |
        set -e
        python scripts/build_report.py

    # ─────────────────────────────
    # 9. 결과 커밋 + 푸시
    # ─────────────────────────────
    - name: Commit and push results
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"

        echo "=== git status ==="
        git status

        # 🎯 정확한 파일만 추가
        git add data/tracking.json data/stats.json data/report.json 2>/dev/null || true
        git add tracking.json stats.json report.json 2>/dev/null || true

        # 🔍 변경 없으면 종료
        if git diff --cached --quiet; then
          echo "No changes — skip commit"
          exit 0
        fi

        git commit -m "auto update $(date '+%Y-%m-%d %H:%M')"
        git push
